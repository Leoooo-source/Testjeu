<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1a">
<link rel="manifest" href="manifest.json">
<title>Les Profondeurs</title>
<style>
body{margin:0;font-family:system-ui;background:#0b0f1a;color:#e6edf3}
.container{max-width:480px;margin:auto;padding:12px}
button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;background:#1f6feb;color:white;font-weight:600}
.panel{background:#121a2b;padding:12px;border-radius:12px;margin-bottom:10px}
.log{height:220px;overflow-y:auto;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h2>Les Profondeurs</h2>
<div class="panel">
<button onclick="start()">Nouvelle Partie</button>
<button onclick="explore()">Explorer</button>
<button onclick="attack()">Attaquer</button>
</div>
<div class="panel log" id="log"></div>
</div>

<script>
let player,enemy;

function log(t){let l=document.getElementById("log");l.innerHTML+=t+"<br>";l.scrollTop=l.scrollHeight;}
function r(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function start(){
player={hp:25,atk:4,room:0};
log("Début de l'exploration.");
}

function explore(){
if(!player)return;
player.room++;
if(player.room%5===0){
enemy={hp:50,atk:8};
log("BOSS apparaît !");
}else{
enemy={hp:r(12,20),atk:r(3,6)};
log("Monstre ("+enemy.hp+" PV)");
}
}

function attack(){
if(!enemy)return;
let dmg=r(1,6)+player.atk;
enemy.hp-=dmg;
log("Vous infligez "+dmg);
if(enemy.hp<=0){log("Victoire");enemy=null;return;}
let edmg=r(1,6)+enemy.atk;
player.hp-=edmg;
log("Vous subissez "+edmg);
if(player.hp<=0){log("Mort permanente");player=null;}
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
