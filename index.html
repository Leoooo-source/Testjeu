
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<script src="js/core.js"></script>
</head>
<body onload="if(!player){initPlayer()}">
<div class="container">
<div class="panel">
<h3>Personnage</h3>
<p>Niveau: <script>document.write(player.level)</script></p>
<p>Points disponibles: <script>document.write(player.points)</script></p>

<p>Vie: <script>document.write(player.vie)</script>
<button class="button secondary" onclick="addPoint('vie')">+</button>

<p>Magie: <script>document.write(player.magie)</script>
<button class="button secondary" onclick="addPoint('magie')">+</button>

<p>Force: <script>document.write(player.force)</script>
<button class="button secondary" onclick="addPoint('force')">+</button>

<p>Défense: <script>document.write(player.defense)</script>
<button class="button secondary" onclick="addPoint('defense')">+</button>

<button class="button" onclick="location.href='exploration.html'">Exploration</button>
<button class="button secondary" onclick="location.href='inventory.html'">Inventaire</button>
</div>
</div>
</body>
</html>
